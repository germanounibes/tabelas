<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Html tables for Activity" />
    <meta name="keywords" content="HTML, CSS, Tables" />
    <meta name="author" content="joão Germano" />
    <title>Tabela</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <script>
const imagens = [
    'imagens/1.jpg',
    'imagens/2.jpg',
    'imagens/3.png',
    'imagens/4.jpg',
    'imagens/5.jpg',
    'imagens/6.jpg',
    'imagens/7.jpg',
    'imagens/8.png',
    'imagens/9.jpg',
    'imagens/10.jpg',
];

function mudarFundo() {
    const indiceAleatorio = Math.floor(Math.random() * imagens.length);
    
    document.body.style.backgroundImage = `url('${imagens[indiceAleatorio]}')`;
}

window.onload = mudarFundo;

    function atualizarRelogio() {
      const agora = new Date();
      const horas = String(agora.getHours()).padStart(2, "0");
      const minutos = String(agora.getMinutes()).padStart(2, "0");
      const segundos = String(agora.getSeconds()).padStart(2, "0");

      document.getElementById("relogio").innerText =
        `${horas}:${minutos}:${segundos}`;
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();
    function toggleTabela() {
      const sidebar = document.getElementById("minhaSidebar");
      sidebar.classList.toggle("aberta");
    }
  </script>
  <body>
    <center>
      <h1 id="relogio">00:00:00</h1>
    </center>
    <div class="sidebar-tabela" id="minhaSidebar">
      <button class="btn-toggle" onclick="toggleTabela()"></button>
      <table border="5">
        <tr>
          <td colspan="3" align="center">A História do Linux</td>

        </tr>

              >Ubuntu</a
            >

            <a href="https://youtu.be/V-oIMSYY2D4?si=GKFuhxi1XQn3znFT"

        <tr>
